<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Counting Chart 1 to 200</title>
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --highlight: #ff0000;
      --muted: #d0d0d0;
      --cell-border: #555;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    header {
      width: min(100%, 1100px);
      margin-bottom: 18px;
    }

    h1 {
      font-size: 2rem;
      margin: 0 0 8px;
    }

    .instructions {
      font-size: 1.1rem;
      color: var(--muted);
      margin: 0;
    }

    .mode-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 16px 0 0;
    }

    .mode-button {
      min-width: 180px;
      padding: 12px 20px;
      border: 3px solid #fff;
      border-radius: 8px;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-button[aria-pressed="true"] {
      background: #222;
      box-shadow: inset 0 0 0 2px #fff;
    }

    .mode-button:focus-visible {
      outline: 4px solid var(--highlight);
      outline-offset: 3px;
    }

    .status {
      font-size: 1.3rem;
      margin: 16px 0;
      font-weight: bold;
      min-height: 1.5em;
    }

    .chart {
      width: min(100%, 1100px);
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(5, 86px);
      gap: 10px;
    }

    .number-cell {
      width: 100%;
      height: 86px;
      border: 2px solid var(--cell-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: 0;
      border-radius: 8px;
      background: #000;
      color: #fff;
      overflow: visible;
      white-space: nowrap;
      text-align: center;
      position: relative;
    }

    .number-cell.current {
      border-color: transparent;
    }

    .number-cell.current::after {
      content: "";
      position: absolute;
      inset: -5px;
      border: 8px solid var(--highlight);
      border-radius: 12px;
      pointer-events: none;
      z-index: 999;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .chart {
        gap: 6px;
        grid-template-rows: repeat(5, 56px);
      }

      .mode-controls {
        gap: 8px;
      }

      .mode-button {
        min-width: 150px;
        padding: 10px 14px;
        font-size: 1rem;
      }

      .number-cell {
        height: 56px;
        font-size: clamp(1.35rem, 5vw, 2rem);
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Counting Chart: 1 to 200</h1>
    <p class="instructions">Press Enter or Space to move to the next number. Use the buttons, or press T to count by tens and O to count by ones. Press R to restart.</p>
    <div class="mode-controls" role="group" aria-label="Counting options">
      <button class="mode-button" id="onesButton" type="button" aria-pressed="true">Count by ones</button>
      <button class="mode-button" id="tensButton" type="button" aria-pressed="false">Count by tens</button>
    </div>
    <div class="status" id="status" aria-hidden="true">Current number: 0</div>
  </header>

  <main class="chart" id="chart" aria-label="Interactive counting chart showing 50 numbers at a time"></main>

  <div id="announcement" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

  <script>
    const chart = document.getElementById('chart');
    const status = document.getElementById('status');
    const announcement = document.getElementById('announcement');
    const onesButton = document.getElementById('onesButton');
    const tensButton = document.getElementById('tensButton');

    const maxNumber = 200;
    const numbersPerPage = 50;
    const countModes = {
      ones: {
        label: 'ones',
        step: 1,
        firstNumber: 1
      },
      tens: {
        label: 'tens',
        step: 10,
        firstNumber: 10
      }
    };

    let countMode = 'ones';
    let currentNumber = countModes[countMode].firstNumber;
    let hasStarted = false;

    function getPageStart(number) {
      return Math.floor((number - 1) / numbersPerPage) * numbersPerPage + 1;
    }

    function updateModeButtons() {
      onesButton.setAttribute('aria-pressed', countMode === 'ones' ? 'true' : 'false');
      tensButton.setAttribute('aria-pressed', countMode === 'tens' ? 'true' : 'false');
    }

    function renderChart() {
      updateModeButtons();
      chart.innerHTML = '';
      const pageStart = getPageStart(currentNumber);
      const pageEnd = Math.min(pageStart + numbersPerPage - 1, maxNumber);

      for (let number = pageStart; number <= pageEnd; number += 1) {
        const cell = document.createElement('div');
        cell.className = 'number-cell';
        cell.textContent = number;
        cell.setAttribute('role', 'text');
        cell.setAttribute('aria-label', `${number}`);

        if (hasStarted && number === currentNumber) {
          cell.classList.add('current');
        }

        chart.appendChild(cell);
      }

      const displayedNumber = hasStarted ? currentNumber : 0;
      status.textContent = `Current number: ${displayedNumber}`;
      announcement.textContent = hasStarted ? String(currentNumber) : '';
    }

    function resetCountingPosition() {
      currentNumber = countModes[countMode].firstNumber;
      hasStarted = false;
    }

    function nextNumber() {
      const currentMode = countModes[countMode];

      if (!hasStarted) {
        currentNumber = currentMode.firstNumber;
        hasStarted = true;
        renderChart();
        return;
      }

      if (currentNumber + currentMode.step <= maxNumber) {
        currentNumber += currentMode.step;
        renderChart();
      } else {
        announcement.textContent = String(currentNumber);
      }
    }

    function restart() {
      resetCountingPosition();
      renderChart();
      announcement.textContent = '0';
    }

    function changeCountingMode(newMode) {
      if (!countModes[newMode]) {
        return;
      }

      countMode = newMode;
      resetCountingPosition();
      renderChart();
      announcement.textContent = `Counting by ${countModes[countMode].label}`;
    }

    onesButton.addEventListener('click', () => {
      changeCountingMode('ones');
    });

    tensButton.addEventListener('click', () => {
      changeCountingMode('tens');
    });

    document.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      const targetIsButton = event.target && event.target.closest && event.target.closest('button');

      if (!targetIsButton && (event.key === 'Enter' || event.key === ' ' || event.code === 'Space')) {
        event.preventDefault();
        nextNumber();
      }

      if (key === 't') {
        event.preventDefault();
        changeCountingMode('tens');
      }

      if (key === 'o') {
        event.preventDefault();
        changeCountingMode('ones');
      }

      if (key === 'r') {
        event.preventDefault();
        restart();
      }
    });

    renderChart();
  </script>
</body>
</html>
